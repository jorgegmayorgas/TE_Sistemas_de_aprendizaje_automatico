<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recomendador Inteligente de Cursos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .card {
            border-radius: 15px;
        }
        .title {
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4 text-center">🎓 Recomendador Inteligente de Cursos</h2>

        <!-- FORMULARIO -->
        <div class="row g-3">

            <div class="col-md-3">
                <label class="form-label">Edad</label>
                <input type="number" id="age" class="form-control" placeholder="Ej: 30">
            </div>

            <div class="col-md-3">
                <label class="form-label">Nivel</label>
                <select id="skill_level" class="form-select">
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Categoría</label>
                <select id="category" class="form-select">
                    <option value="AI">AI</option>
                    <option value="Data Science">Data Science</option>
                    <option value="Web Dev">Web Dev</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Cybersecurity">Cybersecurity</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Engagement (0 - 1)</label>
                <input type="number" step="0.1" id="engagement" class="form-control" placeholder="Ej: 0.7">
            </div>

        </div>

        <!-- BOTÓN -->
        <div class="text-center">
            <button class="btn btn-success mt-4 px-4" onclick="getRecommendations()">
                🔍 Recomendar Cursos
            </button>
        </div>

        <hr>

        <!-- INFO USUARIO -->
        <div id="user_info"></div>

        <!-- RESULTADOS -->
        <ul id="results" class="list-group mt-3"></ul>

    </div>

</div>

<script>
function getRecommendations() {

    let age = document.getElementById("age").value;
    let skill = document.getElementById("skill_level").value;
    let category = document.getElementById("category").value;
    let engagement = document.getElementById("engagement").value;

    let results = document.getElementById("results");
    let userInfo = document.getElementById("user_info");

    // Limpiar UI
    results.innerHTML = "";
    userInfo.innerHTML = "";

    // Validación básica
    if (!age || !engagement) {
        results.innerHTML = `
            <li class="list-group-item text-danger">
                ⚠️ Debes introducir edad y engagement
            </li>
        `;
        return;
    }

    // Loader
    results.innerHTML = `
        <li class="list-group-item">
            ⏳ Generando recomendaciones...
        </li>
    `;

    fetch(`/recommend-smart?age=${age}&skill_level=${skill}&category=${category}&engagement=${engagement}`)
        .then(res => res.json())
        .then(data => {

            results.innerHTML = "";

            if (data.error) {
                results.innerHTML = `
                    <li class="list-group-item text-danger">
                        ${data.error}
                    </li>
                `;
                return;
            }

            // Usuario usado
            userInfo.innerHTML = `
                <div class="alert alert-info">
                    <strong>Usuario similar encontrado:</strong><br>
                    ID: ${data.matched_user.user_id} |
                    Edad: ${data.matched_user.age} |
                    Cluster: ${data.matched_user.cluster}
                </div>
            `;

            // Recomendaciones
            data.recommendations.forEach(course => {

                let li = document.createElement("li");
                li.className = "list-group-item";

                li.innerHTML = `
                    <div class="d-flex justify-content-between">
                        <div>
                            <span class="title">${course.title}</span><br>
                            Categoría: ${course.category} |
                            Nivel: ${course.difficulty_level}
                        </div>
                        <div>
                            ⭐ ${course.rating_avg}
                        </div>
                    </div>
                `;

                results.appendChild(li);
            });

        })
        .catch(error => {
            results.innerHTML = `
                <li class="list-group-item text-danger">
                    Error conectando con el servidor
                </li>
            `;
            console.error(error);
        });
}
</script>

</body>
</html>
