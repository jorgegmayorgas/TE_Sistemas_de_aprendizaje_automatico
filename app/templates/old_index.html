<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recomendador de Cursos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="mb-4">🎓 Recomendador de Cursos</h2>

        <div class="row">
            <div class="col-md-6">
                <input type="number" id="age" class="form-control" placeholder="Edad">
            </div>

            <div class="col-md-6">
                <input type="text" id="country" class="form-control" placeholder="País (ej: Spain)">
            </div>
        </div>

        <button class="btn btn-primary mt-3" onclick="getRecommendations()">
            Recomendar
        </button>

        <hr>

        <div id="user_info" class="mb-3"></div>

        <ul id="results" class="list-group"></ul>
    </div>

</div>

<script>
function getRecommendations() {

    let age = document.getElementById("age").value;
    let country = document.getElementById("country").value;

    fetch(`/recommend?age=${age}&country=${country}`)
        .then(res => res.json())
        .then(data => {

            let list = document.getElementById("results");
            let userInfo = document.getElementById("user_info");

            list.innerHTML = "";
            userInfo.innerHTML = "";

            if (data.error) {
                list.innerHTML = `<li class="list-group-item text-danger">${data.error}</li>`;
                return;
            }

            // Mostrar usuario usado
            userInfo.innerHTML = `
                <div class="alert alert-info">
                    Usuario usado: ID ${data.user_used.user_id} |
                    Edad ${data.user_used.age} |
                    Cluster ${data.user_used.cluster}
                </div>
            `;

            // Mostrar recomendaciones
            data.recommendations.forEach(course => {
                let li = document.createElement("li");
                li.className = "list-group-item";

                li.innerHTML = `
                    <strong>${course.title}</strong><br>
                    Categoría: ${course.category} |
                    Nivel: ${course.difficulty_level} |
                    ⭐ ${course.rating_avg}
                `;

                list.appendChild(li);
            });
        });
}
</script>

</body>
</html>
